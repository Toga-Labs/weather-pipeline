stages:
  - terraform_infra
  - build
  - upload
  - terraform_lambda

variables:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  # Set these in GitLab CI/CD variables:
  # AWS_ACCESS_KEY_ID
  # AWS_SECRET_ACCESS_KEY
  # AWS_DEFAULT_REGION (e.g. eu-west-2)
  # SCRIPTS_BUCKET (e.g. weather-pipeline-scripts-tg)

###############################################
# 1. TERRAFORM INFRASTRUCTURE (BUCKETS, IAM, GLUE, CRAWLERS)
###############################################
terraform_infra:
  stage: terraform_infra
  image:
    name: hashicorp/terraform:1.6.0
    entrypoint: [""]
  script:
  - terraform init
  - |
    terraform apply --auto-approve \
      --target=module.s3 \
      --target=module.iam \
      --target=module.glue_job \
      --target=module.glue_crawler_raw \
      --target=module.glue_crawler_curated

  artifacts:
    paths:
      - .
    expire_in: 1 hour

###############################################
# 2. BUILD LAMBDA ZIP
###############################################
build_lambda:
  stage: build
  image: python:3.10
  script:
    - apt-get update -y
    - apt-get install -y zip
    - cd lambda_ingestion_code
    - pip install -r requirements.txt -t package
    - cp lambda_handler.py package/
    - cd package
    - zip -r ../lambda.zip .
  artifacts:
    paths:
      - lambda_ingestion_code/lambda.zip

###############################################
# 3. UPLOAD LAMBDA ZIP + ETL SCRIPT TO S3
###############################################
upload_scripts:
  stage: upload
  image: amazon/aws-cli:2.15
  script:
    - aws s3 cp lambda_ingestion_code/lambda.zip s3://$SCRIPTS_BUCKET/lambda/lambda.zip
    - aws s3 cp etl_scripts/weather_etl.py s3://$SCRIPTS_BUCKET/etl/weather_etl.py

###############################################
# 4. TERRAFORM LAMBDA DEPLOY (AFTER ZIP EXISTS)
###############################################
terraform_lambda:
  stage: terraform_lambda
  image:
    name: hashicorp/terraform:1.6.0
    entrypoint: [""]
  script:
    - terraform init
    - terraform apply -auto-approve -target=module.lambda_ingestion
