############################################################
# 1. GLOBAL IMAGE (Terraform)
############################################################
image:
  name: hashicorp/terraform:1.6.0
  entrypoint: [""]

stages:
  - terraform_infra
  - build
  - upload
  - terraform_apply

variables:
  TF_IN_AUTOMATION: "true"

############################################################
# 2. APPLY FULL INFRASTRUCTURE (S3, IAM, Glue, Crawlers, Athena)
############################################################
terraform_infra:
  stage: terraform_infra
  script:
    - terraform init
    - terraform apply -auto-approve

############################################################
# 3. BUILD LAMBDA ZIP (Python)
############################################################
build_lambda:
  stage: build
  image: python:3.11
  script:
    - apt-get update && apt-get install -y zip
    - cd lambda_ingestion_code && zip -r ../lambda.zip .
  artifacts:
    paths:
      - lambda.zip

############################################################
# 4. UPLOAD LAMBDA ZIP TO S3 (AWS CLI)
############################################################
upload_scripts:
  stage: upload
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  script:
    - aws s3 cp lambda.zip s3://$SCRIPTS_BUCKET/lambda/lambda.zip

############################################################
# 5. APPLY TERRAFORM AGAIN TO UPDATE LAMBDA ONLY
############################################################
terraform_apply:
  stage: terraform_apply
  script:
    - terraform init
    - terraform apply -auto-approve
