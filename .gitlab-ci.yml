############################################################
# GLOBAL IMAGE (Terraform)
############################################################
image:
  name: hashicorp/terraform:1.6.0
  entrypoint: [""]

stages:
  - terraform_infra
  - build
  - upload
  - terraform_lambda

variables:
  TF_IN_AUTOMATION: "true"

############################################################
# 1. APPLY INFRASTRUCTURE ONLY (NO LAMBDA)
############################################################
terraform_infra:
  stage: terraform_infra
  script:
    - terraform init
    - terraform apply -auto-approve -var="deploy_lambda=false"

############################################################
# 2. BUILD LAMBDA ZIP (Python)
############################################################
build_lambda:
  stage: build
  image: python:3.11
  script:
    - apt-get update && apt-get install -y zip
    - cd lambda_ingestion_code && zip -r ../lambda.zip .
  artifacts:
    paths:
      - lambda.zip

############################################################
# 3. UPLOAD LAMBDA ZIP TO S3
############################################################
upload_scripts:
  stage: upload
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  script:
    - aws s3 cp lambda.zip s3://$SCRIPTS_BUCKET/lambda/lambda.zip

############################################################
# 4. APPLY TERRAFORM AGAIN (CREATE LAMBDA NOW)
############################################################
terraform_lambda:
  stage: terraform_lambda
  script:
    - terraform init
    - terraform apply -auto-approve -var="deploy_lambda=true"
