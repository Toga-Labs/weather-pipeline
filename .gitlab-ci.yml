
stages:
  - terraform_infra
  - build
  - upload
  - terraform_lambda

############################################################
# 1. TERRAFORM INFRASTRUCTURE (RUN MANUALLY)
############################################################
terraform_infra:
  stage: terraform_infra
  image:
    name: hashicorp/terraform:1.6.0
    entrypoint: [""]
  script:
    - terraform init
    - |
      terraform apply -refresh=false --auto-approve \
        --target=module.s3 \
        --target=module.iam \
        --target=module.glue_job \
        --target=module.glue_crawler_raw \
        --target=module.glue_crawler_curated
  artifacts:
    paths:
      - .
    expire_in: 1 hour

############################################################
# 2. BUILD LAMBDA ZIP
############################################################
build_lambda:
  stage: build
  image: python:3.11
  script:
    - apt-get update && apt-get install -y zip
    - pip install -r lambda_ingestion_code/requirements.txt -t lambda_ingestion_code/
    - cd lambda_ingestion_code && zip -r ../lambda.zip .
  artifacts:
    paths:
      - lambda.zip
    expire_in: 1 hour


############################################################
# 3. UPLOAD SCRIPTS TO S3
############################################################
upload_scripts:
  stage: upload
  image: 
    name: amazon/aws-cli:latest
    entrypoint: [""]  # This unlocks the container so GitLab can run 'sh'
  script:
    - aws s3 cp lambda.zip s3://$SCRIPTS_BUCKET/lambda/lambda.zip
    - aws s3 cp etl_scripts/weather_etl.py s3://$SCRIPTS_BUCKET/etl/weather_etl.py


############################################################
# 4. TERRAFORM LAMBDA DEPLOYMENT
############################################################
terraform_lambda:
  stage: terraform_lambda
  image:
    name: hashicorp/terraform:1.6.0
    entrypoint: [""]
  script:
    - terraform init
    - |
      terraform apply \
        -var="enable_infra=false" \
        --auto-approve \
        --target=module.lambda_ingestion


    # Apply ONLY the Lambda module
    # - enable_infra=false prevents IAM/S3/Glue modules from running
    # - --target=module.lambda_ingestion ensures only Lambda is deployed

