############################################################
# 1. GLOBAL "SAFETY NET" (Defaults to Terraform)
############################################################
image:
  name: hashicorp/terraform:1.6.0
  entrypoint: [""]

stages:
  - terraform_infra
  - build
  - upload
  - terraform_lambda

variables:
  TF_IN_AUTOMATION: "true"

############################################################
# 2. USES GLOBAL IMAGE (Terraform)
############################################################
terraform_infra:
  stage: terraform_infra
  script:
    - terraform init
    - terraform apply -refresh=false --auto-approve --target=module.s3 # ...etc

############################################################
# 3. OVERRIDES GLOBAL (Uses Python)
############################################################
build_lambda:
  stage: build
  image: python:3.11  # <--- MIXED IMAGE: Overrides Terraform
  script:
    - apt-get update && apt-get install -y zip
    - cd lambda_ingestion_code && zip -r ../lambda.zip .
  artifacts:
    paths:
      - lambda.zip

############################################################
# 4. OVERRIDES GLOBAL (Uses AWS CLI)
############################################################
upload_scripts:
  stage: upload
  image:
    name: amazon/aws-cli:latest # <--- MIXED IMAGE: Overrides Terraform
    entrypoint: [""]
  script:
    - aws s3 cp lambda.zip s3://$SCRIPTS_BUCKET/lambda/lambda.zip

############################################################
# 5. USES GLOBAL IMAGE (Terraform)
############################################################
terraform_lambda:
  stage: terraform_lambda
  # Terraform image from the top of the file. stop runner using ruby image
  script:
    - terraform init
    - terraform apply -var="enable_infra=false" -auto-approve -target=module.lambda_ingestion

    # Apply ONLY the Lambda module
    # - enable_infra=false prevents IAM/S3/Glue modules from running
    # - --target=module.lambda_ingestion ensures only Lambda is deployed

